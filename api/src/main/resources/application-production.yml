spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:support_agent}?prepareThreshold=0
    username: ${DB_USERNAME:support_agent}
    password: ${DB_PASSWORD:support_agent_dev}
  data:
    redis:
      url: ${REDIS_URL:}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/event-stream
    min-response-size: 1024

app:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

logging:
  level:
    root: INFO
    com.example: INFO
    org.hibernate.SQL: WARN
