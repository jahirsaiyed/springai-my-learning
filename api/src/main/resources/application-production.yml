spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/event-stream
    min-response-size: 1024

app:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

logging:
  level:
    root: INFO
    com.example: INFO
    org.hibernate.SQL: WARN
