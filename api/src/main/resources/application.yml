        enabled: ${REDIS_SSL:false}

app:
  jwt:
    secret: ${JWT_SECRET:4db786992c62aa33adff23d17c3544f61e92c4949ee1ad596d09aaa4da8d286b}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  github:
    client-id: ${GITHUB_CLIENT_ID:Ov23liWmHMr8Dh3PlrV3}
    client-secret: ${GITHUB_CLIENT_SECRET:f3785ecc8ae0dfda2d455245e1a32ea21191afb2}
  cache:
    l2-similarity-threshold: ${CACHE_L2_THRESHOLD:0.95}
    rag-similarity-threshold: ${CACHE_RAG_THRESHOLD:0.98}
    ttl:
      policy-faq-hours: ${CACHE_TTL_POLICY:24}
      order-status-minutes: ${CACHE_TTL_ORDER:5}
      refund-status-minutes: ${CACHE_TTL_REFUND:10}
      procedural-hours: ${CACHE_TTL_PROCEDURAL:1}
      general-minutes: ${CACHE_TTL_GENERAL:30}
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}
