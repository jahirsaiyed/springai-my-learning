spring:
  ai:
    openai:
      api-key: ${COMPASS_API_KEY}
      base-url: https://api.core42.ai
      chat:
        options:
          model: gpt-4.1
          temperature: 0.7
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-large}
          dimensions: 1536
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 1536
    mcp:
      client:
        sse:
          connections:
            ecommerce:
              url: ${ECOMMERCE_MCP_URL:http://localhost:8081}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:support_agent}?prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
  cache:
    l2-similarity-threshold: ${CACHE_L2_THRESHOLD:0.95}
    rag-similarity-threshold: ${CACHE_RAG_THRESHOLD:0.98}
    ttl:
      policy-faq-hours: ${CACHE_TTL_POLICY:24}
      order-status-minutes: ${CACHE_TTL_ORDER:5}
      refund-status-minutes: ${CACHE_TTL_REFUND:10}
      procedural-hours: ${CACHE_TTL_PROCEDURAL:1}
      general-minutes: ${CACHE_TTL_GENERAL:30}
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}
  ecommerce:
    provider: ${ECOMMERCE_PROVIDER:olist}
  memory:
    retention:
      episodic-default-days: ${RETENTION_EPISODIC_DAYS:365}
      cache-cleanup-interval-minutes: ${RETENTION_CACHE_CLEANUP:60}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  mcp:
    retry-max-attempts: ${MCP_RETRY_MAX_ATTEMPTS:2}
    retry-initial-backoff-ms: ${MCP_RETRY_BACKOFF_MS:500}
    circuit-breaker-failure-threshold: ${MCP_CB_FAILURE_THRESHOLD:3}
    circuit-breaker-reset-timeout-ms: ${MCP_CB_RESET_TIMEOUT_MS:30000}
    max-failures-before-escalation: ${MCP_MAX_FAILURES_ESCALATION:3}
server:
  port: ${SERVER_PORT:8080}
