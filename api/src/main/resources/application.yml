spring:
  ai:
    openai:
      api-key: ${COMPASS_API_KEY:ec23d88e543a47219e6194615aaf22d3}
      base-url: https://api.core42.ai
      chat:
        options:
          model: gpt-4.1
          temperature: 0.7
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-large}
          dimensions: 1536
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 1536

  datasource:
    url: jdbc:postgresql://${DB_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${DB_PORT:6543}/${DB_NAME:postgres}?prepareThreshold=0
    username: ${DB_USERNAME:postgres.jubfkjoaymuuxnowiyvs}
    password: ${DB_PASSWORD:sgJB0BYqc1fHeMl4}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public

  data:
    redis:
      host: ${REDIS_HOST:redis-16483.crce264.ap-east-1-1.ec2.cloud.redislabs.com}
      port: ${REDIS_PORT:16483}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:GHPJeFWJAjVnxRJYmY3DrySxaUJxr6AB}
